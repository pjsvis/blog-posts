# ============================================================
# blog-posts Flox Environment Manifest
# ============================================================
# Target: Reproducible toolchain for the blog-posts silo
# across macOS (aarch64-darwin) and Linux (x86_64-linux, aarch64-linux).
#
# Tool inventory derived from: justfile, scripts/, and playbooks/
#
# Usage:
#   flox init                          # Initialise in project root
#   flox install                       # Install packages from manifest
#   flox activate                      # Enter environment
#   flox run -- just check             # One-shot run without shell
# ============================================================

version = 1

# ============================================================
# [install] — Packages from nixpkgs
# ============================================================

[install]

# ---- CORE (required for blog-posts to function) ----
just.pkg-path = "just"
jq.pkg-path = "jq"
watchexec.pkg-path = "watchexec"
gh.pkg-path = "gh"
ruby_3_3.pkg-path = "ruby_3_3"

# ---- UI + INTERACTION (justfile, scripts) ----
glow.pkg-path = "glow"
gum.pkg-path = "gum"

# ---- UNIX UTILITIES (scripts, navigation) ----
ripgrep.pkg-path = "ripgrep"
fd.pkg-path = "fd"
tree.pkg-path = "tree"
bat.pkg-path = "bat"
bat.optional = true

# ---- OPTIONAL (useful but not critical) ----
fzf.pkg-path = "fzf"
fzf.optional = true

# ============================================================
# [vars] — Environment variables
# ============================================================
[vars]
# bun install path (not in nixpkgs — installed via official script)
BUN_INSTALL = "$HOME/.bun"

# ============================================================
# [profile] — Shell scripts on activation
# ============================================================
[profile]
common = '''
# Add bun to PATH (installed via official script, not in nixpkgs)
if [ -f "$BUN_INSTALL/bun" ]; then
  [ -d "$BUN_INSTALL/bin" ] && export PATH="$BUN_INSTALL/bin:$PATH"
fi

# fzf integration — used in interactive scripts
if command -v fzf >/dev/null 2>&1; then
  export FZF_DEFAULT_COMMAND="fd --type f"
  export FZF_CTRL_T_COMMAND="$FZF_DEFAULT_COMMAND"
fi

# glow: default to auto-detect terminal width
export GLOW_TERM_WIDTH=auto
'''

# ============================================================
# [options] — Environment behaviour
# ============================================================
[options]
systems = [
  "x86_64-linux",
  "aarch64-linux",
  "x86_64-darwin",
  "aarch64-darwin",
]

# ============================================================
# NOT in nixpkgs (install separately after flox activate)
# ============================================================
# bun              curl -fsSL https://bun.sh/install | bash
# defuddle         see playbooks/defuddle-playbook.md
# td               go install github.com/marcus/td@latest
#
# ============================================================
# Tool availability map
# ============================================================
# Tool             nixpkgs  Brew      Required?  Notes
# ---------------  -------  --------  ---------  -----------------------------
# just             ✅       ✅        YES        Task runner
# jq               ✅       ✅        YES        JSON processing (reg-sync, reg-list)
# watchexec        ✅       ✅        YES        Watch mode for scripts
# gh               ✅       ✅        YES        GitHub CLI
# glow             ✅       ✅        YES        Markdown renderer (Charm)
# gum              ✅       ✅        YES        TUI prompts (Charm)
# ripgrep          ✅       ✅        YES        Fast grep (rg in scripts)
# fd               ✅       ✅        YES        Fast find (scripts)
# tree             ✅       ✅        YES        Directory tree (just orient)
# bat              ✅       ✅        no         Syntax-highlighted cat
# fzf              ✅       ✅        no         Fuzzy finder
# defuddle         ❌       ❌        no         Extract markdown from web pages
# td               ❌       ❌        no         Task manager (go install)
# bun              ❌       ✅        no         Bun runtime (curl install)